name: Sync Garmin to Notion

on:
  push:
    branches:
      - main
    paths:
      - 'src/workflows/sleep-data.py'

  schedule:
    - cron: '0 1 * * *' # Dagelijks om 01.00 uur Belgische tijd
      timezone: 'Europe/Brussels'

  workflow_dispatch:
    inputs:
      GARMIN_ACTIVITIES_FETCH_LIMIT:
        type: number
        default: 10
      GARMIN_SLEEP_DAYS_BACK:
        description: Number of sleep dates to check and backfill
        type: number
        default: 500

env:
  TZ: 'Europe/Brussels'

concurrency:
  group: garmin-to-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --upgrade-package garminconnect

      - name: Run script
        env:
          GARMIN_AUTH_TOKEN: ${{ secrets.GARMIN_AUTH_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ inputs.GARMIN_ACTIVITIES_FETCH_LIMIT || '10' }}
          GARMIN_SLEEP_DAYS_BACK: ${{ github.event_name == 'push' && '500' || inputs.GARMIN_SLEEP_DAYS_BACK || '30' }}
          TZ: 'Europe/Brussels'

        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            uv run python -m src.workflows.sleep-data
          else
            uv run python -m src.workflows.garmin-activities
            uv run python -m src.workflows.personal-records
            uv run python -m src.workflows.daily-steps
            uv run python -m src.workflows.sleep-data
          fi
